name: CI

# Läuft bei jedem Push auf main und bei jedem Pull Request gegen main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff prüfen
        run: ruff check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest ausführen
        run: pytest

# Hinweis: mypy --strict ist bewusst kein CI-Gate. Der Lauf bleibt manuell
# (`mypy --strict src/`); ein eigener Job ist ausdrücklich nicht gewünscht.
